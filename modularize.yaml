# modularize.yaml — Split monolithic dage.py into dage/ package
#
# Topology (2 parallel extraction streams + 1 integration):
#
#   prep ──┬──> foundation ──> gate_found ──┐
#          └──> execution  ──> gate_exec  ──┴──> integrate ──> gate_all
#
# Design source: tasks/design-modularize.md
# Work streams:  tasks/workstreams-modularize.md

nodes:
  # ── Layer 0: package directory ──────────────────────────────────
  prep:
    type: shell
    role: context
    cmd: "mkdir -p dage"

  # ── Layer 1: parallel extraction ────────────────────────────────

  foundation:
    type: claude
    role: produce
    deps: [prep]
    prompt: |
      Goal: Extract foundation layer modules from dage.py into the dage/ package.

      Read tasks/workstreams-modularize.md (Stream 1 section) and
      tasks/design-modularize.md for full specifications.
      Read dage.py to extract exact code — it is the sole source of truth.

      Create 5 files:
      - dage/__init__.py: __version__, minimal public re-exports
      - dage/models.py: Role, NodeType, Status enums; Node, NodeResult dataclasses;
        constants (_ROLE_MAX_RUNS, _ANSI_COLORS, _SKILL_SEARCH_PATHS)
      - dage/prompts.py: all prompt template strings, rename _X to X (now module-public)
      - dage/workflow.py: load_workflow, build_nodes, validate_workflow, interpolate,
        topo_layers, next_runnable, find_blocked, _extract_yaml;
        _max_output exposed via set_max_output()/get_max_output()
      - dage/tui.py: DageDisplay, _LiveProxy, log_line, print_summary, print_plan,
        print_status; _display/_HAS_RICH module-private; rich guarded with try/except

      Constraints:
      - Do NOT modify or delete dage.py
      - Do NOT create executor.py, git_ops.py, replan.py, planner.py, engine.py, cli.py
      - Preserve all function signatures exactly
      - Cross-module imports: workflow imports from models only, tui imports from models only

  execution:
    type: claude
    role: produce
    deps: [prep]
    prompt: |
      Goal: Extract execution layer modules from dage.py into the dage/ package.

      Read tasks/workstreams-modularize.md (Stream 2 section) and
      tasks/design-modularize.md for full specifications.
      Read dage.py to extract exact code — it is the sole source of truth.

      Create 4 files:
      - dage/executor.py: _active_procs/_active_procs_lock (module-private),
        kill_active_procs, _run_streamed, run_shell, run_claude, execute_node,
        call_claude (promoted from _call_claude at L1579 — used by both replan and
        planner, so it belongs here as the shared entry point for single claude CLI calls),
        _load_skills, _parse_timeout;
        provide register_signal_handlers() — no import-time side effects
      - dage/git_ops.py: _merge_single_worktree, merge_worktrees, prune_worktrees,
        auto_commit, setup_worktree
      - dage/replan.py: detect_replan, call_replanner, apply_replan, handle_replan,
        _confirm_replan; call_replanner uses executor.call_claude (import it)
      - dage/planner.py: generate_plan, _run_phase, _inject_skills;
        uses executor.call_claude (import it, do NOT duplicate _call_claude)

      Constraints:
      - Write imports from foundation modules (models, workflow, prompts) as if they exist
      - Do NOT modify or delete dage.py
      - Do NOT create models.py, prompts.py, workflow.py, tui.py, engine.py, cli.py,
        __init__.py, __main__.py
      - Preserve all function signatures exactly
      - _active_procs module-private, exposed only via kill_active_procs()

  # ── Layer 2: verification gates ─────────────────────────────────

  gate_found:
    type:    shell
    role:    gate
    deps:    [foundation]
    timeout: 2m
    cmd: |
      python -c "
      from dage.models import Node, Role, Status, NodeType, NodeResult
      from dage.prompts import META_STYLE, REPLAN_PROMPT, PLAN_PROMPT
      from dage.workflow import load_workflow, interpolate, topo_layers, next_runnable, find_blocked
      from dage.tui import DageDisplay
      print('foundation OK')
      "

  gate_exec:
    type:    shell
    role:    gate
    deps:    [execution]
    timeout: 2m
    cmd: |
      python -c "
      import ast
      for m in ['executor', 'git_ops', 'replan', 'planner']:
          ast.parse(open(f'dage/{m}.py').read())
          print(f'{m}.py syntax OK')
      "

  # ── Layer 3: integration ────────────────────────────────────────

  integrate:
    type: claude
    role: produce
    deps: [gate_found, gate_exec]
    prompt: |
      Goal: Complete the dage/ package — extract remaining modules, wire all imports,
      delete dage.py, and ensure the full package works identically to the original.

      Read tasks/workstreams-modularize.md (Stream 3 section) and
      tasks/design-modularize.md for full specifications.

      Foundation layer notes: ${nodes.foundation.output}
      Execution layer notes: ${nodes.execution.output}

      Tasks:
      1. Extract dage/engine.py: run_dag, _handle_gate_fail, _autofix_gate,
         _annotate_design_docs, save_state, _load_resume_state, should_skip,
         _hot_reload, build_context, _build_summary
      2. Extract dage/cli.py: build_parser, cmd_run, cmd_validate, cmd_status,
         cmd_plan, main(); sys.exit() ONLY here; signal handler registration in main()
      3. Create dage/__main__.py: from dage.cli import main; main()
      4. Create pyproject.toml with [project.scripts] dage = "dage.cli:main"
      5. Finalize dage/__init__.py with correct public exports
      6. Fix ALL cross-module import issues — test each module imports cleanly
      7. Delete dage.py from repository root

      Key risks to resolve:
      - _log_line (L256 in dage.py) references _display (tui.py). The design's
        dependency graph intentionally avoids executor->tui. Either use a callback
        injected by engine at runtime, or accept the executor->tui import if it
        doesn't create a cycle (tui only depends on models, so executor->tui->models
        is acyclic). Make a judgment call and document it.
      - _extract_yaml must be imported from workflow.py by both planner.py and
        replan.py — verify no copies exist
      - No circular imports. Strict dependency flow:
        models -> workflow -> executor -> git_ops/replan -> engine -> cli
        (tui is a leaf dependency of models only; can be imported by any layer)

  # ── Layer 4: full verification ──────────────────────────────────

  gate_all:
    type:    shell
    role:    gate
    deps:    [integrate]
    timeout: 5m
    cmd: |
      set -e
      python -c "from dage.cli import main; print('import OK')"
      python -m dage --help
      python -m dage run tests/test_parallel.yaml
      python -m dage run tests/test_parallel_gate.yaml
      python -m dage run examples/test-shell.yaml
      pip install -e . && dage --help
      echo "ALL CHECKS PASSED"
